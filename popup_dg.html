<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="individual.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>

    .modal-hero {
    background-image: url("img2/poster/poster3.png"); 
    }
    
    @media (max-width: 767px) {
        .modal-hero {
            background-image: url("img2/poster/15828d52-463c-4f5b-8f75-33abd5ca0e8a-d.png");
        }
    }
    </style>

</head>
<body>
    
        <header class="modal-header padding-left padding-right">
            <button class="back-btn" onclick="history.back()">
                <i class="fas fa-arrow-left"></i> 돌아가기
            </button>
        </header>

        <section class="modal-hero padding-left padding-right"> 
        </section>

        <section class="stillcuts-section padding-left padding-right padding-top">
            <div>
                <h1 class="movie-title2 text-lg"> Pirates of the Caribbean</h1>
                <p class="gray-font personal-margin">잭스패로우처럼 역경을 극복하여 나아가는 이야기
             </div>
            <div class="stillcuts-grid">
                <div class="stillcut-item border-radius"><img src="steel/kb1.png" alt="스틸컷 1"></div>
                <div class="stillcut-item border-radius"><img src="steel/kb2.png" alt="스틸컷 2"></div>
                <div class="stillcut-item border-radius"><img src="steel/kb3.png" alt="스틸컷 3"></div>
                <div class="stillcut-item border-radius"><img src="steel/kb4.png" alt="스틸컷 4"></div>
            </div>
        </section>

        <section class="movie-info-section">
            <p class="gray-font personal-margin text-xs">고어 버빈스키 · 2006.11.23 · 21년</p>
            
            <p class="movie-synopsis">
                고2때 예체능 계열에 크게 관심이 없었다가 어느날 예체능 쪽으로 방향성을 정해 인문계 고등학교에서 예술고등학교로 전학을 갔고 고3때 입시에서 좋은 결과를 받지 못하여 잭스패로우가 고난과 역경을 겪고도 블랙펄 호에 타 모험을 이어나가듯 재수를 결정해 1년을 더 미술입시를 하다가 계원예술대학교에 입학했다.
            </p>
            
            <p class="gray-font personal-margin">오동근</p>
            
            <div class="tags-and-score">
                <span class="tag">느긋한</span>
                <span class="tag">단순한</span>
                <span class="tag">내향인</span>
            </div>
        </section>

        <div class="button-rayout">
            <button class="ticket-btn border-radius" onclick="location.href='popup2.html'">
                예매하기
            </button>   
        </div>

</html>
